<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Copymantle</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css"
    />
    <link rel="stylesheet" href="/game.css" />
  </head>
  <body>
    <section class="section">
      <p class="mb-2">Copy the url to share this game</p>
      <form action="javascript:submitGuess()">
        <label for="guess">Guess:</label>
        <input
          id="guess-input"
          name="guess"
          type="text"
          autocomplete="off"
          autofocus
        />
        <input type="submit" value="Submit" />
      </form>
      <div id="message-area"></div>
      <table id="guesses-table" class="table">
        <thead>
          <tr id="guesses-table-header">
            <th
              onclick="changeGuessesTableSorting.apply(this)"
              data-field="number"
              data-sort-default="descending"
            >
              #
            </th>
            <th
              onclick="changeGuessesTableSorting.apply(this)"
              data-field="guess"
              data-sort-default="ascending"
            >
              Guess
            </th>
            <th
              onclick="changeGuessesTableSorting.apply(this)"
              data-field="similarity"
              data-sort-default="descending"
              data-sort="descending"
            >
              Similarity
            </th>
            <th
              onclick="changeGuessesTableSorting.apply(this)"
              data-field="near"
              data-sort-default="descending"
            >
              Near?
            </th>
          </tr>
        </thead>
        <tbody id="guesses-table-body"></tbody>
      </table>
    </section>
    <script src="/game.js"></script>
  </body>
</html>
