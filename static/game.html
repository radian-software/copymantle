<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Copymantle</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css"
    />
  </head>
  <body>
    <div>Copy the url to share this game</div>
    <form action="javascript:submitGuess()">
      <label for="guess">Guess:</label>
      <input id="guess" name="guess" type="text" autocomplete="off" autofocus />
      <input type="submit" value="Submit" />
    </form>
    <div id="message"></div>
    <table class="sortable">
      <thead>
        <tr>
          <th class="sorttable_numeric">#</th>
          <th class="sorttable_alpha">Guess</th>
          <th class="sorttable_numeric" id="similarity">Similarity</th>
          <th class="sorttable_nosort">Near?</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
    <script src="/sorttable.js"></script>
    <script src="/index.js"></script>
  </body>
</html>
