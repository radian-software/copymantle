<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Copymantle</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css"
    />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <section>
      <div class="container page p-3">
        <p class="mb-2">Copy the url to share this game</p>
        <form action="javascript:submitGuess()">
          <div id="guess-form-fields" class="field has-addons">
            <div class="control is-expanded">
              <input
                id="guess-input"
                name="guess"
                class="input"
                type="text"
                placeholder="Enter a word"
                autocomplete="off"
                autofocus
              />
            </div>
            <div class="control">
              <input type="submit" class="control button" value="Submit" />
            </div>
          </div>
        </form>
        <div id="message-area"></div>
        <div id="guesses-table-container" class="container">
          <table id="guesses-table" class="table">
            <thead>
              <tr id="guesses-table-header">
                <th
                  onclick="changeGuessesTableSorting.apply(this)"
                  data-field="number"
                  data-sort-default="descending"
                >
                  #
                </th>
                <th
                  onclick="changeGuessesTableSorting.apply(this)"
                  data-field="guess"
                  data-sort-default="ascending"
                >
                  Guess
                </th>
                <th
                  onclick="changeGuessesTableSorting.apply(this)"
                  data-field="similarity"
                  data-sort-default="descending"
                  data-sort="descending"
                >
                  Similarity
                </th>
                <th
                  onclick="changeGuessesTableSorting.apply(this)"
                  data-field="near"
                  data-sort-default="descending"
                >
                  Near?
                </th>
              </tr>
            </thead>
            <tbody id="guesses-table-body"></tbody>
          </table>
        </div>
      </div>
    </section>
    <script src="/game.js"></script>
  </body>
</html>
